<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerenciador de Pessoas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="shell">

  <header>
    <div class="logo-group">
      <h1>Pessoas</h1>
      <p>localhost:8080 · Spring Boot</p>
    </div>
    <div class="api-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusLabel">verificando...</span>
    </div>
  </header>

  <!-- FORM -->
  <div class="card">
    <div class="card-title">Cadastrar / Editar</div>

    <div class="editing-banner" id="editingBanner">
      ✏️ Editando registro <strong id="editingId"></strong> — preencha os campos e salve
    </div>

    <div class="form-grid">
      <input type="hidden" id="pessoaId" />

      <div class="full">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Nome completo" />
      </div>

      <div>
        <label>E-mail</label>
        <input type="email" id="email" placeholder="email@exemplo.com" />
      </div>

      <div>
        <label>Telefone</label>
        <input type="tel" id="telefone" placeholder="(85) 99999-9999" />
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" onclick="salvar()">Salvar</button>
      <button class="btn-ghost" onclick="limpar()">Limpar</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="table-header">
      <div class="card-title" style="margin:0">Registros</div>
      <span class="badge" id="totalBadge">0 pessoas</span>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:50px">ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th style="width:120px; text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <div class="icon">◌</div>
              Carregando dados...
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
</body>
</html>
